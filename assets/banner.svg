<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b"/>
      <stop offset="50%" stop-color="#0c0c2a"/>
      <stop offset="100%" stop-color="#02000a"/>
    </linearGradient>

    <!-- Noise Gradient -->
    <linearGradient id="noise-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Flow Gradient -->
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.9"/>
    </linearGradient>
    
    <!-- Text Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />

  <!-- Animated-like Abstract Waves representing Denoising Diffusion -->
  <!-- Noise Wave (Left, High Frequency/Turbulent) -->
  <path d="M 0 200 C 100 120, 150 280, 250 160 C 350 80, 400 320, 500 200 C 600 120, 700 240, 800 180 L 1200 400 L 0 400 Z" fill="url(#noise-grad)" opacity="0.35" />
  
  <!-- Structure Wave (Right, Clean/Smooth) -->
  <path d="M 0 300 C 300 200, 450 350, 600 220 C 750 100, 900 280, 1200 150 L 1200 400 L 0 400 Z" fill="url(#flow-grad)" opacity="0.4" />

  <!-- Glowing Particles / Noise Pixels -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="100" cy="120" r="2" />
    <circle cx="180" cy="220" r="3" />
    <circle cx="250" cy="80" r="1.5" />
    <circle cx="320" cy="280" r="2.5" />
    <circle cx="450" cy="150" r="1" />
    <circle cx="550" cy="240" r="3" />
    <circle cx="680" cy="90" r="2" />
    <circle cx="800" cy="300" r="4" fill="#a78bfa" filter="url(#glow)"/>
    <circle cx="950" cy="180" r="5" fill="#38bdf8" filter="url(#glow)"/>
    <circle cx="1050" cy="120" r="3" fill="#34d399" filter="url(#glow)"/>
    <circle cx="1120" cy="250" r="6" fill="#f472b6" filter="url(#glow)"/>
  </g>

  <!-- Clean Grid lines on the right side representing mathematical structure -->
  <g stroke="#38bdf8" stroke-width="0.5" opacity="0.2">
    <line x1="800" y1="0" x2="800" y2="400" />
    <line x1="900" y1="0" x2="900" y2="400" />
    <line x1="1000" y1="0" x2="1000" y2="400" />
    <line x1="1100" y1="0" x2="1100" y2="400" />
    <line x1="700" y1="100" x2="1200" y2="100" />
    <line x1="700" y1="200" x2="1200" y2="200" />
    <line x1="700" y1="300" x2="1200" y2="300" />
  </g>

  <!-- Title Text -->
  <text x="600" y="190" font-family="'Outfit', 'Inter', sans-serif" font-weight="800" font-size="54" fill="#ffffff" text-anchor="middle" filter="url(#glow)" letter-spacing="2">
    AWESOME DENOISING DIFFUSION
  </text>
  
  <!-- Subtitle Text -->
  <text x="600" y="240" font-family="'Inter', sans-serif" font-weight="400" font-size="20" fill="#a78bfa" text-anchor="middle" letter-spacing="4">
    A CURATED LIST OF STATE-OF-THE-ART GENERATIVE MODELS
  </text>
</svg>
